<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Mr Rocks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --neon-red: #ff073a;
            --dark-black: #0a0a0a;
            --gray-dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-black);
            color: var(--white);
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: rgba(10, 10, 10, 0.98);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 7, 58, 0.6);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 5%;
        }

        .logo-small {
            height: 50px;
            width: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 8px var(--neon-red));
        }

        .cart-btn-main {
            position: relative;
            background: var(--neon-red);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 7, 58, 0.8);
            animation: pulseCart 2s infinite;
        }

        @keyframes pulseCart {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 7, 58, 0.8); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 7, 58, 1); }
        }

        .cart-btn-main i {
            font-size: 1.5rem;
            color: var(--white);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--white);
            color: var(--neon-red);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Logo Section */
        .logo-section {
            margin-top: 80px;
            width: 100%;
            min-height: 50vh;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--gray-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--neon-red);
        }

        .logo-fullwidth {
            width: 85%;
            max-width: 800px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(255, 7, 58, 0.9));
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 30px rgba(255, 7, 58, 0.7)); transform: scale(1); }
            to { filter: drop-shadow(0 0 50px rgba(255, 7, 58, 1)); transform: scale(1.02); }
        }

        .brand-title {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 4rem;
            color: var(--neon-red);
            text-shadow: 0 0 30px var(--neon-red), 0 0 60px var(--neon-red);
            margin-top: 1.5rem;
            letter-spacing: 5px;
            animation: glowText 2s ease-in-out infinite alternate;
        }

        @keyframes glowText {
            from { text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red); }
            to { text-shadow: 0 0 40px var(--neon-red), 0 0 70px var(--neon-red), 0 0 100px var(--neon-red); }
        }

        .brand-subtitle {
            font-size: 1.8rem;
            color: var(--white);
            text-shadow: 0 0 15px var(--white), 0 0 30px var(--white);
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* Hero Section */
        .hero {
            min-height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?auto=format&fit=crop&w=1920');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background: var(--neon-red);
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 0 0 30px var(--neon-red);
            border: 3px solid var(--neon-red);
            animation: ctaPulse 2s infinite;
        }

        @keyframes ctaPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Offers Section */
        .offers-section {
            padding: 3rem 5%;
            text-align: center;
        }

        .offers-title {
            font-size: 3rem;
            color: var(--neon-red);
            text-shadow: 0 0 20px var(--neon-red);
            margin-bottom: 3rem;
            font-family: 'Arial Black', sans-serif;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--gray-dark);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--neon-red);
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 7, 58, 0.6);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--white);
        }

        .product-price {
            font-size: 1.8rem;
            color: var(--neon-red);
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: var(--neon-red);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(255, 7, 58, 0.6);
        }

        .add-to-cart:active {
            transform: scale(0.95);
        }

        /* Cart Modal - Grande y Visible */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-container {
            background: var(--gray-dark);
            border: 3px solid var(--neon-red);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 0 50px rgba(255, 7, 58, 0.8);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--neon-red);
        }

        .cart-header h2 {
            color: var(--neon-red);
            font-size: 2rem;
        }

        .close-cart {
            background: var(--neon-red);
            border: none;
            color: var(--white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-item {
            background: var(--dark-black);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            border: 1px solid var(--neon-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-info h4 {
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--neon-red);
            font-weight: bold;
        }

        .remove-item {
            background: #dc3545;
            border: none;
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-total {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid var(--neon-red);
            font-size: 1.8rem;
            text-align: center;
            color: var(--neon-red);
            font-weight: bold;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.2rem;
            background: #25D366;
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
        }

        /* WhatsApp Float */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.8);
            z-index: 999;
            animation: whatsappPulse 2s infinite;
        }

        @keyframes whatsappPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Footer */
        footer {
            background: var(--gray-dark);
            padding: 2rem 5%;
            text-align: center;
            border-top: 2px solid var(--neon-red);
            margin-top: 4rem;
        }

        .secret-admin {
            position: fixed;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            opacity: 0.05;
            cursor: pointer;
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 3000;
            display: none;
            overflow-y: auto;
            padding: 2rem;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--neon-red);
        }

        .admin-header h1 {
            color: var(--neon-red);
            font-size: 2rem;
        }

        .close-admin {
            background: var(--neon-red);
            color: var(--white);
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 1rem 2rem;
            background: var(--gray-dark);
            border: 2px solid var(--neon-red);
            color: var(--white);
            border-radius: 10px;
            cursor: pointer;
        }

        .admin-tab.active {
            background: var(--neon-red);
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .admin-card {
            background: var(--gray-dark);
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            border: 2px solid var(--neon-red);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--neon-red);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark-black);
            border: 2px solid var(--neon-red);
            border-radius: 8px;
            color: var(--white);
        }

        .btn {
            padding: 0.8rem 2rem;
            background: var(--neon-red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 1rem;
        }

        .btn-danger {
            background: #dc3545;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--dark-black);
            padding: 1.5rem;
            border-radius: 10px;
            border: 2px solid var(--neon-red);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            color: var(--neon-red);
            font-weight: bold;
        }

        .visitors-list, .buyers-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            background: var(--dark-black);
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            border-left: 3px solid var(--neon-red);
        }

        /* Login Modal */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .login-modal.active {
            display: flex;
        }

        .login-box {
            background: var(--gray-dark);
            padding: 3rem;
            border-radius: 20px;
            border: 3px solid var(--neon-red);
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 {
            color: var(--neon-red);
            text-align: center;
            margin-bottom: 2rem;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--neon-red);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 10px;
            z-index: 5000;
            display: none;
            animation: slideIn 0.3s;
        }

        .notification.show {
            display: block;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .brand-title { font-size: 2.5rem; }
            .brand-subtitle { font-size: 1.2rem; }
            .offers-title { font-size: 2rem; }
            .products-grid { grid-template-columns: 1fr; }
            .cart-container { max-height: 90vh; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <img src="https://i.postimg.cc/DwFgSm2b/IMG-4370.png?v=4.0" alt="Logo" class="logo-small" id="logo" title="Doble clic para admin">
            <div class="cart-btn-main" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <!-- Logo Section -->
    <section class="logo-section">
        <img src="https://i.postimg.cc/DwFgSm2b/IMG-4370.png?v=4.0" alt="Mr Rocks" class="logo-fullwidth">
        <h1 class="brand-title">MR ROCKS</h1>
        <p class="brand-subtitle">Cosas de hombres</p>
    </section>

    <!-- Hero -->
    <section class="hero">
        <a href="#ofertas" class="cta-button">Ver Colección</a>
    </section>

    <!-- Offers Section -->
    <section class="offers-section" id="ofertas">
        <h2 class="offers-title">Solo ofertas del mes</h2>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-container">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-cart"></i> Tu Carrito</h2>
                <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-total">Total: $<span id="cartTotal">0</span></div>
            <button class="checkout-btn" onclick="checkout()">
                <i class="fab fa-whatsapp"></i> Comprar por WhatsApp
            </button>
        </div>
    </div>

    <!-- WhatsApp -->
    <a href="https://wa.me/573008150549?text=Saludos.%20Bro,%20quiero%20este%20o%20estos%20productos,%20porfavor" 
       class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Footer -->
    <footer>
        <p style="color: var(--neon-red); margin-bottom: 0.5rem;">MR ROCKS</p>
        <p style="color: #666; font-size: 0.9rem;">© 2026 - WhatsApp: 3008150549</p>
        <div class="secret-admin" onclick="openLogin()"><i class="fas fa-cog"></i></div>
    </footer>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Acceso Admin</h2>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Contraseña">
            </div>
            <button class="btn" onclick="loginAdmin()" style="width: 100%;">Ingresar</button>
            <button class="btn btn-danger" onclick="closeLogin()" style="width: 100%; margin-top: 1rem;">Cancelar</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-shield-alt"></i> Panel de Administración</h1>
                <button class="close-admin" onclick="closeAdmin()">Cerrar</button>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" onclick="showTab('products')">Productos</button>
                <button class="admin-tab" onclick="showTab('buyers')">Compradores</button>
                <button class="admin-tab" onclick="showTab('visitors')">Visitantes</button>
            </div>

            <!-- Products Tab -->
            <div class="admin-section active" id="productsTab">
                <div class="admin-card">
                    <h3 style="color: var(--neon-red); margin-bottom: 1rem;">Agregar Producto</h3>
                    <div class="form-group"><input type="text" id="prodName" placeholder="Nombre"></div>
                    <div class="form-group"><input type="number" id="prodPrice" placeholder="Precio"></div>
                    <div class="form-group">
                        <select id="prodCategory">
                            <option value="billeteras">Billeteras</option>
                            <option value="morrales">Morrales</option>
                            <option value="camisetas">Camisetas</option>
                            <option value="bermudas">Bermudas</option>
                            <option value="accesorios">Accesorios</option>
                        </select>
                    </div>
                    <div class="form-group"><input type="text" id="prodImage" placeholder="URL de imagen (PostImages)"></div>
                    <button class="btn" onclick="saveProduct()">Guardar</button>
                </div>
                <div class="admin-card" id="adminProductsList"></div>
            </div>

            <!-- Buyers Tab -->
            <div class="admin-section" id="buyersTab">
                <div class="admin-card">
                    <h3 style="color: var(--neon-red); margin-bottom: 1rem;">Lista de Compradores</h3>
                    <div class="buyers-list" id="buyersList"></div>
                </div>
            </div>

            <!-- Visitors Tab -->
            <div class="admin-section" id="visitorsTab">
                <div class="admin-card">
                    <h3 style="color: var(--neon-red); margin-bottom: 1rem;">Estadísticas</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="totalVisitors">0</div>
                            <div>Total Visitantes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalBuyers">0</div>
                            <div>Total Compradores</div>
                        </div>
                    </div>
                    <h4 style="color: var(--neon-red); margin: 1rem 0;">Visitantes Recientes</h4>
                    <div class="visitors-list" id="visitorsList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Data
        const defaultProducts = [
            { id: 1, name: "Billetera Clásica Negra", category: "billeteras", price: 89000, image: "https://images.unsplash.com/photo-1627123424574-181ce5171c98?w=400" },
            { id: 2, name: "Morral Urbano Premium", category: "morrales", price: 159000, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400" },
            { id: 3, name: "Camiseta Street Style", category: "camisetas", price: 69000, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" },
            { id: 4, name: "Bermuda Denim", category: "bermudas", price: 99000, image: "https://images.unsplash.com/photo-1591195853828-11db59a44f6b?w=400" }
        ];

        let products = JSON.parse(localStorage.getItem('mrRocksProducts')) || defaultProducts;
        let cart = [];
        let visitors = JSON.parse(localStorage.getItem('mrRocksVisitors')) || [];
        let buyers = JSON.parse(localStorage.getItem('mrRocksBuyers')) || [];

        // Track visitor
        function trackVisitor() {
            const visitor = {
                date: new Date().toISOString(),
                ip: 'visitor_' + Math.random().toString(36).substr(2, 9)
            };
            visitors.push(visitor);
            localStorage.setItem('mrRocksVisitors', JSON.stringify(visitors));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            trackVisitor();
            renderProducts();
            setupLogoDoubleClick();
        });

        function setupLogoDoubleClick() {
            const logo = document.getElementById('logo');
            let lastClick = 0;
            logo.addEventListener('click', () => {
                const now = Date.now();
                if (now - lastClick < 300) openLogin();
                lastClick = now;
            });
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <div class="product-price">$${p.price.toLocaleString()}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">
                            <i class="fas fa-cart-plus"></i> Agregar al Carrito
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            updateCart();
            showNotification('✅ Producto agregado');
            
            // Animación del carrito
            const cartBtn = document.querySelector('.cart-btn-main');
            cartBtn.style.transform = 'scale(1.3)';
            setTimeout(() => cartBtn.style.transform = 'scale(1)', 300);
        }

        function updateCart() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            
            const itemsDiv = document.getElementById('cartItems');
            itemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <div class="cart-item-price">$${item.price.toLocaleString()} x ${item.quantity}</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = total.toLocaleString();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('❌ Carrito vacío');
                return;
            }

            // Save buyer
            const buyer = {
                date: new Date().toISOString(),
                items: cart.map(item => item.name).join(', '),
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            };
            buyers.push(buyer);
            localStorage.setItem('mrRocksBuyers', JSON.stringify(buyers));

            let message = 'Saludos. Bro, quiero este o estos productos, porfavor:%0A%0A';
            cart.forEach(item => {
                message += `- ${item.name} x${item.quantity}: $${(item.price * item.quantity).toLocaleString()}%0A`;
            });
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `%0ATotal: $${total.toLocaleString()}`;

            window.open(`https://wa.me/573008150549?text=${message}`, '_blank');
        }

        // Admin Functions
        function openLogin() { document.getElementById('loginModal').classList.add('active'); }
        function closeLogin() { 
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        function loginAdmin() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'admin123' || pass === 'mrrocks2026') {
                closeLogin();
                openAdmin();
            } else {
                showNotification('❌ Contraseña incorrecta');
            }
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            renderAdminProducts();
            renderBuyers();
            renderVisitors();
        }

        function closeAdmin() { document.getElementById('adminPanel').classList.remove('active'); }

        function showTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'buyers') renderBuyers();
            if (tab === 'visitors') renderVisitors();
        }

        function saveProduct() {
            const name = document.getElementById('prodName').value;
            const price = parseFloat(document.getElementById('prodPrice').value);
            const category = document.getElementById('prodCategory').value;
            const image = document.getElementById('prodImage').value;

            if (!name || !price || !image) {
                showNotification('❌ Complete todos los campos');
                return;
            }

            const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
            products.push({ id: newId, name, price, category, image });
            localStorage.setItem('mrRocksProducts', JSON.stringify(products));
            
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImage').value = '';
            
            renderProducts();
            renderAdminProducts();
            showNotification('✅ Producto guardado');
        }

        function renderAdminProducts() {
            const div = document.getElementById('adminProductsList');
            div.innerHTML = '<h3 style="color: var(--neon-red); margin-bottom: 1rem;">Productos Existentes</h3>' +
                products.map(p => `
                    <div class="list-item" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${p.name}</strong><br>
                            <span style="color: var(--neon-red)">$${p.price.toLocaleString()}</span>
                        </div>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
        }

        function deleteProduct(id) {
            if (confirm('¿Eliminar?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('mrRocksProducts', JSON.stringify(products));
                renderProducts();
                renderAdminProducts();
            }
        }

        function renderBuyers() {
            const div = document.getElementById('buyersList');
            if (buyers.length === 0) {
                div.innerHTML = '<p style="color: #666;">Sin compradores aún</p>';
                return;
            }
            div.innerHTML = buyers.slice().reverse().map(b => `
                <div class="list-item">
                    <strong>${new Date(b.date).toLocaleString()}</strong><br>
                    ${b.items}<br>
                    <span style="color: var(--neon-red)">Total: $${b.total.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function renderVisitors() {
            document.getElementById('totalVisitors').textContent = visitors.length;
            document.getElementById('totalBuyers').textContent = buyers.length;
            
            const div = document.getElementById('visitorsList');
            if (visitors.length === 0) {
                div.innerHTML = '<p style="color: #666;">Sin visitantes registrados</p>';
                return;
            }
            div.innerHTML = visitors.slice(-20).reverse().map(v => `
                <div class="list-item">
                    ${new Date(v.date).toLocaleString()}
                </div>
            `).join('');
        }

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

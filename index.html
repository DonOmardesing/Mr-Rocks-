<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Rocks - Estilo Urbano para Hombres</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-red: #ff073a;
            --dark-black: #0a0a0a;
            --gray-dark: #1a1a1a;
            --gray-medium: #2a2a2a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-black);
            color: var(--white);
            overflow-x: hidden;
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 5px;
        }

        /* Header con logo pequeño */
        header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 7, 58, 0.5);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-small {
            height: 40px;
            width: auto;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 0 5px var(--neon-red));
            transition: all 0.3s;
        }

        .logo-small:hover {
            filter: drop-shadow(0 0 10px var(--neon-red));
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-red);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--white);
            transition: all 0.3s;
        }

        .cart-icon:hover {
            color: var(--neon-red);
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--neon-red);
            color: var(--white);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* NUEVA SECCIÓN: Logo Full Width */
        .logo-fullwidth-section {
            margin-top: 80px;
            width: 100%;
            min-height: 60vh;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--gray-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid var(--neon-red);
            box-shadow: 0 0 40px rgba(255, 7, 58, 0.3);
        }

        .logo-fullwidth-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 7, 58, 0.2) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .logo-fullwidth {
            width: 90%;
            max-width: 1200px;
            height: auto;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 30px rgba(255, 7, 58, 0.8));
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 7, 58, 0.6));
                transform: scale(1);
            }
            to {
                filter: drop-shadow(0 0 40px rgba(255, 7, 58, 1)) drop-shadow(0 0 60px rgba(255, 7, 58, 0.5));
                transform: scale(1.02);
            }
        }

        /* Hero Section */
        .hero {
            min-height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?auto=format&fit=crop&w=1920');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--dark-black) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--neon-red);
            text-shadow: 0 0 20px var(--neon-red);
            animation: pulse 2s infinite;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--white);
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--neon-red);
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--neon-red);
            border: 2px solid var(--neon-red);
        }

        .cta-button:hover {
            background: transparent;
            transform: translateY(-5px);
            box-shadow: 0 0 30px var(--neon-red), 0 0 60px var(--neon-red);
        }

        /* Promotions Banner */
        .promo-banner {
            background: linear-gradient(90deg, var(--neon-red), #ff4568);
            padding: 1rem;
            text-align: center;
            display: none;
            animation: slideDown 0.5s;
        }

        .promo-banner.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .promo-banner p {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 2rem auto;
            position: relative;
            padding: 0 5%;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: var(--gray-medium);
            border: 2px solid var(--neon-red);
            border-radius: 50px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            box-shadow: 0 0 20px var(--neon-red);
        }

        .search-icon {
            position: absolute;
            right: 35px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-red);
            font-size: 1.2rem;
        }

        /* Categories */
        .categories {
            padding: 4rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.8rem 2rem;
            background: var(--gray-medium);
            border: 2px solid var(--neon-red);
            color: var(--white);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
            transform: translateY(-3px);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .product-card {
            background: var(--gray-dark);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-red);
            box-shadow: 0 10px 30px rgba(255, 7, 58, 0.5);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            color: var(--neon-red);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--white);
        }

        .product-price {
            font-size: 1.5rem;
            color: var(--neon-red);
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: var(--neon-red);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .add-to-cart:hover {
            background: transparent;
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
